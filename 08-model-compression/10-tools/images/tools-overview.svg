    <ns0:text x="30" y="855.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="9"># QLoRA Example</ns0:text>
    <ns0:text x="30" y="880.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="9">model = AutoModelForCausalLM.from_pretrained(..., load_in_4bit=True)</ns0:text>
    <ns0:text x="30" y="905.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="9">model = get_peft_model(model, LoraConfig(r=16, lora_alpha=32))</ns0:text>
