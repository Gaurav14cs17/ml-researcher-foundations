<?xml version="1.0" ?>
<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" viewBox="0.0 0.0 1800.0 1080.0">
  <ns0:defs>
    <ns0:linearGradient id="tradeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <ns0:stop offset="0%" style="stop-color:#ffffff"/>
      <ns0:stop offset="100%" style="stop-color:#2d2d2d"/>
    </ns0:linearGradient>
  </ns0:defs>
  <ns0:rect width="1800.0" height="1080.0" fill="#f8f9fa" rx="8"/>
  <ns0:text x="400" y="30" text-anchor="middle" fill="#e67e22" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Compression Trade-offs</ns0:text>
  <ns0:g transform="translate(30, 60)">
    <ns0:text x="175" y="55.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="13" font-weight="bold">The Compression Triangle</ns0:text>
    <ns0:polygon points="175,35 50,195 300,195" fill="none" stroke="#e0e0e0" stroke-width="2"/>
    <ns0:circle cx="175" cy="35" r="28" fill="#2e7d32"/>
    <ns0:text x="175" y="80.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Accuracy</ns0:text>
    <ns0:circle cx="50" cy="195" r="28" fill="#1565c0"/>
    <ns0:text x="50" y="200" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Size</ns0:text>
    <ns0:circle cx="300" cy="195" r="28" fill="#e65100"/>
    <ns0:text x="300" y="225.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Speed</ns0:text>
  </ns0:g>
  <ns0:g transform="translate(380, 55)">
    <ns0:rect width="380" height="200" rx="10" fill="#1a237e" stroke="#6f42c1" stroke-width="2"/>
    <ns0:text x="190" y="250.0" text-anchor="middle" fill="#6a1b9a" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Method Trade-offs</ns0:text>
    <ns0:text x="60" y="275.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Method</ns0:text>
    <ns0:text x="140" y="300.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Size</ns0:text>
    <ns0:text x="210" y="325.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Speed</ns0:text>
    <ns0:text x="290" y="350.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Acc Drop</ns0:text>
    <ns0:text x="60" y="375.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">INT8</ns0:text>
    <ns0:text x="140" y="400.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">4x</ns0:text>
    <ns0:text x="210" y="425.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">2-4x</ns0:text>
    <ns0:text x="290" y="450.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">&lt;1%</ns0:text>
    <ns0:text x="60" y="475.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">INT4</ns0:text>
    <ns0:text x="140" y="500.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">8x</ns0:text>
    <ns0:text x="210" y="525.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">4-8x</ns0:text>
    <ns0:text x="290" y="550.0" text-anchor="middle" fill="#e65100" font-family="Arial, sans-serif" font-size="10">1-3%</ns0:text>
    <ns0:text x="60" y="575.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Prune</ns0:text>
    <ns0:text x="140" y="600.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">2x</ns0:text>
    <ns0:text x="210" y="625.0" text-anchor="middle" fill="#e65100" font-family="Arial, sans-serif" font-size="10">1-2x*</ns0:text>
    <ns0:text x="290" y="650.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">&lt;1%</ns0:text>
    <ns0:text x="60" y="675.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Distill</ns0:text>
    <ns0:text x="140" y="700.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">5-10x</ns0:text>
    <ns0:text x="210" y="725.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">5-10x</ns0:text>
    <ns0:text x="290" y="750.0" text-anchor="middle" fill="#e65100" font-family="Arial, sans-serif" font-size="10">1-5%</ns0:text>
    <ns0:text x="60" y="775.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">LoRA</ns0:text>
    <ns0:text x="140" y="800.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">100x**</ns0:text>
    <ns0:text x="210" y="825.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Same</ns0:text>
    <ns0:text x="290" y="850.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">&lt;1%</ns0:text>
    <ns0:text x="190" y="875.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="8">*sparse HW needed, **trainable params</ns0:text>
  </ns0:g>
  <ns0:g transform="translate(50, 290)">
    <ns0:rect width="700" height="160" rx="10" fill="#1a237e" stroke="#17a2b8" stroke-width="2"/>
    <ns0:text x="350" y="900.0" text-anchor="middle" fill="#00838f" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Decision Guide</ns0:text>
    <ns0:text x="30" y="925.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="11">Goal: Run LLM on laptop</ns0:text>
    <ns0:text x="280" y="950.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="11">-&gt; INT4 Quantization (GGML)</ns0:text>
    <ns0:text x="30" y="975.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="11">Goal: Fine-tune cheaply</ns0:text>
    <ns0:text x="280" y="1000.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="11">-&gt; QLoRA (4-bit + LoRA)</ns0:text>
    <ns0:text x="30" y="1025.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="11">Goal: Production inference</ns0:text>
    <ns0:text x="280" y="1050.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="11">-&gt; INT8 + TensorRT</ns0:text>
    <ns0:text x="30" y="1075.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="11">Goal: Create smaller model</ns0:text>
    <ns0:text x="280" y="1100.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="11">-&gt; Knowledge Distillation</ns0:text>
  </ns0:g>
</ns0:svg>