<?xml version="1.0" ?>
<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" viewBox="0.0 0.0 1800.0 787.5">
  <ns0:defs>
    <ns0:linearGradient id="sparseOverBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <ns0:stop offset="0%" style="stop-color:#ffffff"/>
      <ns0:stop offset="100%" style="stop-color:#2d2d2d"/>
    </ns0:linearGradient>
  </ns0:defs>
  <ns0:rect width="1800.0" height="787.5" fill="#f8f9fa" rx="8"/>
  <ns0:text x="400" y="30" text-anchor="middle" fill="#00838f" font-family="Arial, sans-serif" font-size="20" font-weight="bold">🕸️ Sparsity in Deep Learning</ns0:text>
  <ns0:g transform="translate(50, 60)">
    <ns0:rect width="200" height="120" rx="10" fill="#1a237e" stroke="#007bff" stroke-width="2"/>
    <ns0:text x="100" y="55.0" text-anchor="middle" fill="#1565c0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">⚖️ Weight Sparsity</ns0:text>
    <ns0:text x="15" y="80.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">Zero out unimportant</ns0:text>
    <ns0:text x="15" y="105.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">model parameters</ns0:text>
    <ns0:text x="15" y="130.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="9">• 50-95% sparsity</ns0:text>
    <ns0:text x="15" y="155.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="9">• 2:4 pattern (NVIDIA)</ns0:text>
  </ns0:g>
  <ns0:g transform="translate(300, 60)">
    <ns0:rect width="200" height="120" rx="10" fill="#1a237e" stroke="#28a745" stroke-width="2"/>
    <ns0:text x="100" y="180.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="12" font-weight="bold">⚡ Activation Sparsity</ns0:text>
    <ns0:text x="15" y="205.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">ReLU naturally creates</ns0:text>
    <ns0:text x="15" y="230.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">zeros at inference</ns0:text>
    <ns0:text x="15" y="255.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="9">• 50-90% activation zeros</ns0:text>
    <ns0:text x="15" y="280.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="9">• Dynamic, input-dependent</ns0:text>
  </ns0:g>
  <ns0:g transform="translate(550, 60)">
    <ns0:rect width="200" height="120" rx="10" fill="#1a237e" stroke="#6f42c1" stroke-width="2"/>
    <ns0:text x="100" y="305.0" text-anchor="middle" fill="#6a1b9a" font-family="Arial, sans-serif" font-size="12" font-weight="bold">👁️ Attention Sparsity</ns0:text>
    <ns0:text x="15" y="330.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">Sparse attention patterns</ns0:text>
    <ns0:text x="15" y="355.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">in Transformers</ns0:text>
    <ns0:text x="15" y="380.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="9">• O(n) instead of O(n²)</ns0:text>
    <ns0:text x="15" y="405.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="9">• Local + global patterns</ns0:text>
  </ns0:g>
  <ns0:g transform="translate(200, 200)">
    <ns0:rect width="400" height="130" rx="12" fill="#1a237e" stroke="#ec4899" stroke-width="2"/>
    <ns0:text x="200" y="430.0" text-anchor="middle" fill="#ec4899" font-family="Arial, sans-serif" font-size="14" font-weight="bold">🎯 Mixture of Experts (MoE)</ns0:text>
    <ns0:text x="20" y="455.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Conditional computation:</ns0:text>
    <ns0:text x="20" y="480.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Only activate subset of experts per token</ns0:text>
    <ns0:text x="20" y="505.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">Mixtral 8x7B: 46B total, 12B active = 6× efficient!</ns0:text>
    <ns0:text x="20" y="530.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">Same quality as 70B dense model</ns0:text>
  </ns0:g>
</ns0:svg>