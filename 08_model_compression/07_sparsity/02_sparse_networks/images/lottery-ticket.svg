<?xml version="1.0" ?>
<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" viewBox="0.0 0.0 1800.0 945.0">
  <ns0:defs>
    <ns0:linearGradient id="ltBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <ns0:stop offset="0%" style="stop-color:#ffffff"/>
      <ns0:stop offset="100%" style="stop-color:#2d2d2d"/>
    </ns0:linearGradient>
  </ns0:defs>
  <ns0:rect width="1800.0" height="945.0" fill="#f8f9fa" rx="8"/>
  <ns0:text x="400" y="30" text-anchor="middle" fill="#e65100" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Lottery Ticket Hypothesis</ns0:text>
  <ns0:text x="400" y="52" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="11">Dense networks contain sparse subnetworks that train to same accuracy</ns0:text>
  <ns0:g transform="translate(30, 80)">
    <ns0:g transform="translate(0, 0)">
      <ns0:rect width="150" height="95" rx="8" fill="#1a237e" stroke="#007bff" stroke-width="2"/>
      <ns0:text x="75" y="77.0" text-anchor="middle" fill="#1565c0" font-family="Arial, sans-serif" font-size="11" font-weight="bold">1. Initialize</ns0:text>
      <ns0:text x="75" y="102.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Dense network</ns0:text>
      <ns0:text x="75" y="127.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">W0 ~ random init</ns0:text>
      <ns0:text x="75" y="152.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">Save W0!</ns0:text>
    </ns0:g>
    <ns0:text x="165" y="177.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="16">-&gt;</ns0:text>
    <ns0:g transform="translate(180, 0)">
      <ns0:rect width="150" height="95" rx="8" fill="#1a237e" stroke="#28a745" stroke-width="2"/>
      <ns0:text x="75" y="202.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="11" font-weight="bold">2. Train</ns0:text>
      <ns0:text x="75" y="227.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Full training</ns0:text>
      <ns0:text x="75" y="252.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">W0 -&gt; W*</ns0:text>
      <ns0:text x="75" y="277.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">Converges</ns0:text>
    </ns0:g>
    <ns0:text x="345" y="302.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="16">-&gt;</ns0:text>
    <ns0:g transform="translate(360, 0)">
      <ns0:rect width="150" height="95" rx="8" fill="#1a237e" stroke="#fd7e14" stroke-width="2"/>
      <ns0:text x="75" y="327.0" text-anchor="middle" fill="#e65100" font-family="Arial, sans-serif" font-size="11" font-weight="bold">3. Prune</ns0:text>
      <ns0:text x="75" y="352.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Remove small</ns0:text>
      <ns0:text x="75" y="377.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">m = |W*| &gt; theta</ns0:text>
      <ns0:text x="75" y="402.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">Get mask m</ns0:text>
    </ns0:g>
    <ns0:text x="525" y="427.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="16">-&gt;</ns0:text>
    <ns0:g transform="translate(540, 0)">
      <ns0:rect width="150" height="95" rx="8" fill="#1a237e" stroke="#6f42c1" stroke-width="2"/>
      <ns0:text x="75" y="452.0" text-anchor="middle" fill="#6a1b9a" font-family="Arial, sans-serif" font-size="11" font-weight="bold">4. Reset</ns0:text>
      <ns0:text x="75" y="477.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Winning ticket!</ns0:text>
      <ns0:text x="75" y="502.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="9">W0 * m</ns0:text>
      <ns0:text x="75" y="527.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="9">Original init!</ns0:text>
    </ns0:g>
  </ns0:g>
  <ns0:g transform="translate(80, 210)">
    <ns0:rect width="640" height="85" rx="10" fill="#1a237e" stroke="#fd7e14" stroke-width="2"/>
    <ns0:text x="320" y="552.0" text-anchor="middle" fill="#e65100" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Key Finding</ns0:text>
    <ns0:text x="320" y="577.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="11">Sparse subnetwork (W0 * m) trained from scratch</ns0:text>
    <ns0:text x="320" y="602.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="11">achieves same accuracy as dense network!</ns0:text>
  </ns0:g>
  <ns0:g transform="translate(80, 315)">
    <ns0:rect width="640" height="80" rx="10" fill="#1a237e" stroke="#17a2b8" stroke-width="2"/>
    <ns0:text x="320" y="627.0" text-anchor="middle" fill="#00838f" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Implications</ns0:text>
    <ns0:text x="160" y="652.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Dense networks are over-parameterized</ns0:text>
    <ns0:text x="480" y="677.0" text-anchor="middle" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Sparse training is possible (in theory)</ns0:text>
  </ns0:g>
</ns0:svg>