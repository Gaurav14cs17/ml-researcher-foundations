<?xml version="1.0" ?>
<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" viewBox="0.0 0.0 1800.0 1170.0">
  <ns0:defs>
    <ns0:linearGradient id="svdBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <ns0:stop offset="0%" style="stop-color:#ffffff"/>
      <ns0:stop offset="100%" style="stop-color:#2d2d2d"/>
    </ns0:linearGradient>
  </ns0:defs>
  <ns0:rect width="1800.0" height="1170.0" fill="#f8f9fa" rx="8"/>
  <ns0:text x="400" y="35" text-anchor="middle" fill="#00838f" font-family="Arial, sans-serif" font-size="18" font-weight="bold">SVD and Low-Rank Approximation</ns0:text>
  <ns0:g transform="translate(30, 60)">
    <ns0:rect width="360" height="170" rx="10" fill="#1a237e" stroke="#17a2b8" stroke-width="2"/>
    <ns0:text x="180" y="60.0" text-anchor="middle" fill="#00838f" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Singular Value Decomposition</ns0:text>
    <ns0:text x="20" y="85.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="11">Full SVD:</ns0:text>
    <ns0:text x="20" y="110.0" fill="#00838f" font-family="Arial, sans-serif" font-size="16">W = U * S * V^T</ns0:text>
    <ns0:text x="20" y="135.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">U: m x m (left singular vectors)</ns0:text>
    <ns0:text x="20" y="160.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">S: m x n (singular values, diagonal)</ns0:text>
    <ns0:text x="20" y="185.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">V: n x n (right singular vectors)</ns0:text>
  </ns0:g>
  <ns0:g transform="translate(410, 60)">
    <ns0:rect width="360" height="170" rx="10" fill="#1a237e" stroke="#28a745" stroke-width="2"/>
    <ns0:text x="180" y="210.0" text-anchor="middle" fill="#2e7d32" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Truncated SVD (rank-r)</ns0:text>
    <ns0:text x="20" y="235.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="11">Best rank-r approximation:</ns0:text>
    <ns0:text x="20" y="260.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="14">W_hat = U_r * S_r * V_r^T</ns0:text>
    <ns0:text x="20" y="285.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Keep top-r singular values</ns0:text>
    <ns0:text x="20" y="310.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">U_r: m x r, S_r: r x r, V_r: n x r</ns0:text>
    <ns0:text x="20" y="335.0" fill="#2e7d32" font-family="Arial, sans-serif" font-size="10">Eckart-Young: Optimal in Frobenius!</ns0:text>
  </ns0:g>
  <ns0:g transform="translate(30, 250)">
    <ns0:rect width="360" height="120" rx="10" fill="#1a237e" stroke="#fd7e14" stroke-width="2"/>
    <ns0:text x="180" y="360.0" text-anchor="middle" fill="#e65100" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Approximation Error</ns0:text>
    <ns0:text x="20" y="385.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="11">Frobenius error:</ns0:text>
    <ns0:text x="20" y="410.0" fill="#e65100" font-family="Arial, sans-serif" font-size="11">||W - W_hat||_F^2 = Sum_{i=r+1} s_i^2</ns0:text>
    <ns0:text x="20" y="435.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Error = sum of discarded singular values^2</ns0:text>
  </ns0:g>
  <ns0:g transform="translate(410, 250)">
    <ns0:rect width="360" height="120" rx="10" fill="#1a237e" stroke="#6f42c1" stroke-width="2"/>
    <ns0:text x="180" y="460.0" text-anchor="middle" fill="#6a1b9a" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Compression Analysis</ns0:text>
    <ns0:text x="20" y="485.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Original: m * n parameters</ns0:text>
    <ns0:text x="20" y="510.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">SVD storage: r * (m + n)</ns0:text>
    <ns0:text x="20" y="535.0" fill="#6a1b9a" font-family="Arial, sans-serif" font-size="10">Compression if r &lt; m*n/(m+n)</ns0:text>
  </ns0:g>
  <ns0:g transform="translate(30, 390)">
    <ns0:rect width="740" height="110" rx="10" fill="#1a237e" stroke="#ec4899" stroke-width="2"/>
    <ns0:text x="370" y="560.0" text-anchor="middle" fill="#ec4899" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Connection to LoRA</ns0:text>
    <ns0:text x="30" y="585.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="11">SVD: W = U_r * S_r * V_r^T (decompose existing)</ns0:text>
    <ns0:text x="30" y="610.0" fill="#f472b6" font-family="Arial, sans-serif" font-size="11">LoRA: dW = B * A (learn low-rank update)</ns0:text>
    <ns0:text x="30" y="635.0" fill="#1a237e" font-family="Arial, sans-serif" font-size="10">Both exploit: weight matrices have low intrinsic rank!</ns0:text>
  </ns0:g>
</ns0:svg>