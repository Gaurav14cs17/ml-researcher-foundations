  <text x="1000" y="1325" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="bold">🎯 Learning Path: Start from Level 1 → Progress sequentially → Master fundamentals before advancing</text>
  <text x="1000" y="1360" text-anchor="middle" fill="#e0f2fe" font-family="Arial, sans-serif" font-size="22">Total: 200+ Topics • 100+ SVG Diagrams • Complete Mathematical Foundation</text>
