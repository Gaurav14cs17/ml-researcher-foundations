<?xml version="1.0" ?>
<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" viewBox="0.0 0.0 2475.0 1912.5">
  <ns0:rect width="100%" height="100%" fill="#f8f9fa" rx="8"/>
  <ns0:text x="550" y="30" font-size="22" font-weight="bold" text-anchor="middle" fill="#1a237e">
    Numerical Stability in Deep Learning
  </ns0:text>
  <ns0:g transform="translate(50, 80)">
    <ns0:text x="500" y="55.0" font-size="16" font-weight="bold" text-anchor="middle" fill="#c62828">
      1. Unstable Softmax → Overflow Problem
    </ns0:text>
    <ns0:rect x="0" y="20" width="1000" height="180" fill="#1a237e" stroke="#dc3545" stroke-width="3" rx="8"/>
    <ns0:g transform="translate(30, 50)">
      <ns0:text x="0" y="80.0" font-size="14" font-weight="bold" fill="#922b21">
        Naive Softmax (UNSTABLE):
      </ns0:text>
      <ns0:rect x="0" y="15" width="940" height="40" fill="#1a237e" stroke="#dc3545" stroke-width="1" rx="3"/>
      <ns0:text x="470" y="105.0" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#922b21">
        softmax(xᵢ) = exp(xᵢ) / Σⱼ exp(xⱼ)
      </ns0:text>
      <ns0:g transform="translate(0, 70)">
        <ns0:text x="0" y="130.0" font-size="13" fill="#1a237e">
          <ns0:tspan font-weight="bold" fill="#c62828">Problem:</ns0:tspan>
          exp(1000) = ∞ (overflow!) • exp(-1000) = 0 (underflow!)
        </ns0:text>
        <ns0:text x="0" y="155.0" font-size="13" fill="#1a237e">
          <ns0:tspan font-weight="bold" fill="#c62828">Example:</ns0:tspan>
          x = [1000, 1001, 999] → exp(x) = [∞, ∞, ∞] → Numerically unstable!
        </ns0:text>
      </ns0:g>
    </ns0:g>
  </ns0:g>
  <ns0:g transform="translate(50, 300)">
    <ns0:text x="500" y="180.0" font-size="16" font-weight="bold" text-anchor="middle" fill="#2e7d32">
      2. Stable Softmax → Subtract Max
    </ns0:text>
    <ns0:rect x="0" y="20" width="1000" height="180" fill="#1a237e" stroke="#28a745" stroke-width="3" rx="8"/>
    <ns0:g transform="translate(30, 50)">
      <ns0:text x="0" y="205.0" font-size="14" font-weight="bold" fill="#145a32">
        Stable Softmax (ALWAYS USE THIS):
      </ns0:text>
      <ns0:rect x="0" y="15" width="940" height="50" fill="#1a237e" stroke="#28a745" stroke-width="2" rx="3"/>
      <ns0:g transform="translate(10, 30)">
        <ns0:text x="0" y="230.0" font-size="14" font-family="Arial, sans-serif" fill="#145a32">
          x_shifted = x - max(x)
        </ns0:text>
        <ns0:text x="0" y="255.0" font-size="14" font-family="Arial, sans-serif" fill="#145a32">
          softmax(xᵢ) = exp(x_shifted_i) / Σⱼ exp(x_shifted_j)
        </ns0:text>
      </ns0:g>
      <ns0:g transform="translate(0, 80)">
        <ns0:text x="0" y="280.0" font-size="13" fill="#2e7d32" font-weight="bold">
          ✓ Why it works: Softmax is translation invariant → softmax(x) = softmax(x + c)
        </ns0:text>
        <ns0:text x="0" y="305.0" font-size="13" fill="#1a237e">
          <ns0:tspan font-weight="bold" fill="#2e7d32">Example:</ns0:tspan>
          x = [1000, 1001, 999] → x - max = [0, 1, -1] → exp([0,1,-1]) = [1.0, 2.7, 0.37] ✓
        </ns0:text>
      </ns0:g>
    </ns0:g>
  </ns0:g>
  <ns0:g transform="translate(50, 520)">
    <ns0:text x="500" y="330.0" font-size="16" font-weight="bold" text-anchor="middle" fill="#1565c0">
      3. Log-Sum-Exp Trick
    </ns0:text>
    <ns0:rect x="0" y="20" width="1000" height="160" fill="#1a237e" stroke="#007bff" stroke-width="3" rx="8"/>
    <ns0:g transform="translate(30, 50)">
      <ns0:text x="0" y="355.0" font-size="14" fill="#1a237e">
        <ns0:tspan font-weight="bold" fill="#1565c0">Problem:</ns0:tspan>
        Computing log(Σᵢ exp(xᵢ)) directly can overflow
      </ns0:text>
      <ns0:text x="0" y="380.0" font-size="14" font-weight="bold" fill="#1565c0">
        Stable Solution:
      </ns0:text>
      <ns0:rect x="0" y="35" width="940" height="40" fill="#1a237e" stroke="#007bff" stroke-width="1" rx="3"/>
      <ns0:text x="470" y="405.0" font-size="14" font-family="Arial, sans-serif" text-anchor="middle" fill="#1a5276">
        log-sum-exp(x) = max(x) + log(Σᵢ exp(xᵢ - max(x)))
      </ns0:text>
      <ns0:text x="0" y="430.0" font-size="12" fill="#1a237e">
        Used in: Cross-entropy loss, negative log-likelihood, Gaussian mixtures
      </ns0:text>
    </ns0:g>
  </ns0:g>
  <ns0:g transform="translate(50, 720)">
    <ns0:text x="500" y="455.0" font-size="16" font-weight="bold" text-anchor="middle" fill="#6a1b9a">
      4. Common Numerical Issues in ML
    </ns0:text>
    <ns0:rect x="0" y="20" width="1000" height="110" fill="#1a237e" stroke="#6f42c1" stroke-width="2" rx="8"/>
    <ns0:g transform="translate(30, 50)">
      <ns0:g>
        <ns0:circle cx="8" cy="-3" r="8" fill="#6a1b9a"/>
        <ns0:text x="8" y="480.0" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a237e">1</ns0:text>
        <ns0:text x="25" y="505.0" font-size="13" fill="#1a237e">
          <ns0:tspan font-weight="bold" fill="#6a1b9a">Division by zero:</ns0:tspan>
          Always add epsilon (ε ≈ 1e-8) to denominators: x/(y + ε)
        </ns0:text>
      </ns0:g>
      <ns0:g transform="translate(0, 25)">
        <ns0:circle cx="8" cy="-3" r="8" fill="#6a1b9a"/>
        <ns0:text x="8" y="530.0" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a237e">2</ns0:text>
        <ns0:text x="25" y="555.0" font-size="13" fill="#1a237e">
          <ns0:tspan font-weight="bold" fill="#6a1b9a">Log of zero:</ns0:tspan>
          Use log(x + ε) or clip: log(max(x, ε))
        </ns0:text>
      </ns0:g>
      <ns0:g transform="translate(0, 50)">
        <ns0:circle cx="8" cy="-3" r="8" fill="#6a1b9a"/>
        <ns0:text x="8" y="580.0" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a237e">3</ns0:text>
        <ns0:text x="25" y="605.0" font-size="13" fill="#1a237e">
          <ns0:tspan font-weight="bold" fill="#6a1b9a">Gradient clipping:</ns0:tspan>
          Prevent exploding gradients: clip(grad, -max_norm, +max_norm)
        </ns0:text>
      </ns0:g>
    </ns0:g>
  </ns0:g>
</ns0:svg>
