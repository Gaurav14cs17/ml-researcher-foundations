<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#1a237e" font-size="28" font-weight="bold">Normalization vs Standardization</text>

  <!-- Left side: Normalization -->
  <g transform="translate(50, 80)">
    <rect width="500" height="320" rx="10" fill="#ffffff" stroke="#1565c0" stroke-width="3"/>
    <text x="250" y="35" text-anchor="middle" fill="#1565c0" font-size="24" font-weight="bold">Normalization (Min-Max Scaling)</text>

    <!-- Formula -->
    <text x="250" y="80" text-anchor="middle" fill="#424242" font-size="18">X′ = (X - Xmin) / (Xmax - Xmin)</text>

    <!-- Visual representation -->
    <g transform="translate(50, 120)">
      <text x="0" y="0" fill="#757575" font-size="14">Original Data: [1, 5, 10, 15, 20]</text>
      <text x="0" y="25" fill="#757575" font-size="14">Range: 1-20</text>

      <!-- Original bars -->
      <rect x="0" y="40" width="20" height="60" fill="#90caf9" opacity="0.7"/>
      <rect x="25" y="40" width="20" height="20" fill="#90caf9" opacity="0.7"/>
      <rect x="50" y="40" width="20" height="40" fill="#90caf9" opacity="0.7"/>
      <rect x="75" y="40" width="20" height="60" fill="#90caf9" opacity="0.7"/>
      <rect x="100" y="40" width="20" height="80" fill="#90caf9" opacity="0.7"/>
      <text x="60" y="145" text-anchor="middle" fill="#424242" font-size="12">Original Scale</text>
    </g>

    <g transform="translate(50, 180)">
      <text x="0" y="0" fill="#757575" font-size="14">Normalized: [0.0, 0.21, 0.47, 0.74, 1.0]</text>
      <text x="0" y="25" fill="#757575" font-size="14">Range: 0-1</text>

      <!-- Normalized bars -->
      <rect x="0" y="40" width="20" height="20" fill="#1565c0" opacity="0.8"/>
      <rect x="25" y="40" width="20" height="42" fill="#1565c0" opacity="0.8"/>
      <rect x="50" y="40" width="20" height="63" fill="#1565c0" opacity="0.8"/>
      <rect x="75" y="40" width="20" height="84" fill="#1565c0" opacity="0.8"/>
      <rect x="100" y="40" width="20" height="100" fill="#1565c0" opacity="0.8"/>
      <text x="60" y="165" text-anchor="middle" fill="#424242" font-size="12">Normalized Scale</text>
    </g>

    <!-- Properties -->
    <g transform="translate(50, 280)">
      <text x="0" y="0" fill="#2e7d32" font-size="14">✓ Preserves relationships</text>
      <text x="0" y="20" fill="#2e7d32" font-size="14">✓ Bounded range [0,1]</text>
      <text x="0" y="40" fill="#c62828" font-size="14">✗ Sensitive to outliers</text>
      <text x="0" y="60" fill="#c62828" font-size="14">✗ Not centered at zero</text>
    </g>
  </g>

  <!-- Right side: Standardization -->
  <g transform="translate(650, 80)">
    <rect width="500" height="320" rx="10" fill="#ffffff" stroke="#e65100" stroke-width="3"/>
    <text x="250" y="35" text-anchor="middle" fill="#e65100" font-size="24" font-weight="bold">Standardization (Z-score)</text>

    <!-- Formula -->
    <text x="250" y="80" text-anchor="middle" fill="#424242" font-size="18">X′ = (X - μ) / σ</text>

    <!-- Visual representation -->
    <g transform="translate(50, 120)">
      <text x="0" y="0" fill="#757575" font-size="14">Original Data: [1, 5, 10, 15, 20]</text>
      <text x="0" y="25" fill="#757575" font-size="14">Mean: 10.2, Std: 7.07</text>

      <!-- Original bars -->
      <rect x="0" y="40" width="20" height="60" fill="#ffcc02" opacity="0.7"/>
      <rect x="25" y="40" width="20" height="20" fill="#ffcc02" opacity="0.7"/>
      <rect x="50" y="40" width="20" height="40" fill="#ffcc02" opacity="0.7"/>
      <rect x="75" y="40" width="20" height="60" fill="#ffcc02" opacity="0.7"/>
      <rect x="100" y="40" width="20" height="80" fill="#ffcc02" opacity="0.7"/>
      <text x="60" y="145" text-anchor="middle" fill="#424242" font-size="12">Original Scale</text>
    </g>

    <g transform="translate(50, 180)">
      <text x="0" y="0" fill="#757575" font-size="14">Standardized: [-1.3, -0.73, -0.03, 0.67, 1.37]</text>
      <text x="0" y="25" fill="#757575" font-size="14">Mean: 0, Std: 1</text>

      <!-- Standardized bars (centered around middle) -->
      <rect x="0" y="60" width="20" height="40" fill="#e65100" opacity="0.8"/>
      <rect x="25" y="65" width="20" height="30" fill="#e65100" opacity="0.8"/>
      <rect x="50" y="70" width="20" height="20" fill="#e65100" opacity="0.8"/>
      <rect x="75" y="75" width="20" height="10" fill="#e65100" opacity="0.8"/>
      <rect x="100" y="40" width="20" height="60" fill="#e65100" opacity="0.8"/>
      <text x="60" y="125" text-anchor="middle" fill="#424242" font-size="12">Standardized Scale</text>
    </g>

    <!-- Properties -->
    <g transform="translate(50, 280)">
      <text x="0" y="0" fill="#2e7d32" font-size="14">✓ Centered at zero</text>
      <text x="0" y="20" fill="#2e7d32" font-size="14">✓ Preserves shape</text>
      <text x="0" y="40" fill="#2e7d32" font-size="14">✓ Less sensitive to outliers</text>
      <text x="0" y="60" fill="#c62828" font-size="14">✗ Unbounded range</text>
    </g>
  </g>

  <!-- Bottom comparison -->
  <g transform="translate(50, 450)">
    <rect width="1100" height="300" rx="10" fill="#ffffff" stroke="#6a1b9a" stroke-width="3"/>
    <text x="550" y="35" text-anchor="middle" fill="#6a1b9a" font-size="24" font-weight="bold">When to Use Which?</text>

    <g transform="translate(50, 60)">
      <text x="0" y="0" fill="#2e7d32" font-size="18" font-weight="bold">Use Normalization when:</text>
      <text x="30" y="30" fill="#424242" font-size="14">• You need bounded values [0,1]</text>
      <text x="30" y="50" fill="#424242" font-size="14">• Using algorithms that require bounded input</text>
      <text x="30" y="70" fill="#424242" font-size="14">• Image processing (pixel values)</text>
      <text x="30" y="90" fill="#424242" font-size="14">• Neural networks with sigmoid/tanh activation</text>
    </g>

    <g transform="translate(600, 60)">
      <text x="0" y="0" fill="#e65100" font-size="18" font-weight="bold">Use Standardization when:</text>
      <text x="30" y="30" fill="#424242" font-size="14">• Algorithm assumes Gaussian distribution</text>
      <text x="30" y="50" fill="#424242" font-size="14">• Features have different units/scales</text>
      <text x="30" y="70" fill="#424242" font-size="14">• PCA, SVM, Linear Regression</text>
      <text x="30" y="90" fill="#424242" font-size="14">• Gradient descent convergence</text>
    </g>

    <!-- Warning box -->
    <g transform="translate(350, 180)">
      <rect width="400" height="80" rx="8" fill="#fff3e0" stroke="#f57f17" stroke-width="2"/>
      <text x="200" y="25" text-anchor="middle" fill="#f57f17" font-size="16" font-weight="bold">⚠️ Important Note</text>
      <text x="200" y="45" text-anchor="middle" fill="#424242" font-size="12">Always fit scaler on training data only,</text>
      <text x="200" y="60" text-anchor="middle" fill="#424242" font-size="12">then transform both train and test sets.</text>
    </g>
  </g>
</svg>

